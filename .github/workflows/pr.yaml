name: PR Build

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild \
            -project Proyecto1.xcodeproj \
            -scheme Proyecto1 \
            -resolvePackageDependencies

      - name: Build project
        run: |
          xcodebuild \
            -project Proyecto1.xcodeproj \
            -scheme Proyecto1 \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_VERSION=5.0 \
            clean \
            build
