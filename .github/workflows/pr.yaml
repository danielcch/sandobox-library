name: PR Build

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
      TUIST_XDG_CACHE_HOME: ${{ github.workspace }}/.cache/tuist
      TUIST_XDG_CONFIG_HOME: ${{ github.workspace }}/.config/tuist
      TUIST_XDG_STATE_HOME: ${{ github.workspace }}/.local/state/tuist

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise and Tuist
        uses: jdx/mise-action@v2

      - name: Cache local Tuist directories
        uses: actions/cache@v4
        with:
          path: |
            .cache/tuist
            .config/tuist
            .local/state/tuist
          key: tuist-${{ runner.os }}-${{ hashFiles('.mise.toml', 'Tuist.swift', 'Project.swift', 'Tuist/Package.swift') }}
          restore-keys: |
            tuist-${{ runner.os }}-

      - name: Install dependencies
        run: tuist install

      - name: Warm cache and generate workspace
        run: |
          tuist cache --configuration Debug --external-only
          tuist generate --configuration Debug --cache-profile development

      - name: Build project
        run: |
          set -o pipefail
          xcodebuild \
            -workspace Proyecto1.xcworkspace \
            -scheme Proyecto1 \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_VERSION=5.0 \
            clean \
            build | xcbeautify --renderer github-actions
