name: PR Build

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
      TUIST_XDG_CACHE_HOME: ${{ github.workspace }}/.cache/tuist
      TUIST_XDG_CONFIG_HOME: ${{ github.workspace }}/.config/tuist
      TUIST_XDG_STATE_HOME: ${{ github.workspace }}/.local/state/tuist
      TUIST_LEGACY_MODULE_CACHE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise and Tuist
        uses: jdx/mise-action@v2

      - name: Restore Tuist binary cache
        id: tuist-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            .cache/tuist/Binaries
            .cache/tuist/Projects
            .cache/tuist/Manifests
          key: tuist-binaries-${{ runner.os }}-xcode26_3-tuist4_111_1-${{ hashFiles('.mise.toml', 'Tuist.swift', 'Project.swift', 'Tuist/Package.swift') }}
          restore-keys: |
            tuist-binaries-${{ runner.os }}-xcode26_3-tuist4_111_1-

      - name: Restore Tuist state
        uses: actions/cache/restore@v4
        with:
          path: |
            .config/tuist
            .local/state/tuist
          key: tuist-state-${{ runner.os }}-${{ hashFiles('.mise.toml') }}
          restore-keys: |
            tuist-state-${{ runner.os }}-

      - name: Install dependencies
        run: tuist install

      - name: Print Tuist cache hashes
        run: tuist hash cache --configuration Debug

      - name: Warm Tuist cache
        run: |
          tuist cache --configuration Debug --external-only

      - name: Generate workspace
        run: |
          tuist generate --configuration Debug --cache-profile development

      - name: Inspect Tuist binary cache
        if: always()
        run: |
          echo "Cache contents:"
          find .cache/tuist -maxdepth 3 -type d | sort || true
          echo "Binary cache size:"
          du -sh .cache/tuist/Binaries 2>/dev/null || true

      - name: Build project
        run: |
          set -o pipefail
          xcodebuild \
            -workspace Proyecto1.xcworkspace \
            -scheme Proyecto1 \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_VERSION=5.0 \
            clean \
            build | xcbeautify --renderer github-actions

      - name: Save Tuist binary cache
        if: always() && steps.tuist-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            .cache/tuist/Binaries
            .cache/tuist/Projects
            .cache/tuist/Manifests
          key: ${{ steps.tuist-cache-restore.outputs.cache-primary-key }}
